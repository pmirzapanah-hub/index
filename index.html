<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cabinet Estimator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #1e1e1e;
      color: #fff;
    }

    h1 {
      margin-bottom: 20px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: #2a2a2a;
      padding: 20px;
      border-radius: 10px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
    }

    input, select {
      width: 100%;
      padding: 8px;
      border-radius: 5px;
      border: none;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #2A7FFF;
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .result {
      margin-top: 20px;
      display: none;
    }
    .result.visible { display: block; }
    .result h2 {
      font-size: 13px;
      color: #aaa;
      margin: 0 0 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .breakdown {
      background: #111;
      border-radius: 8px 8px 0 0;
      overflow: hidden;
    }
    .breakdown-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 14px;
      font-size: 14px;
      border-bottom: 1px solid #222;
      color: #ccc;
    }
    .breakdown-row:last-child { border-bottom: none; }
    .breakdown-row.section-header {
      background: #1a1a1a;
      color: #888;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 6px 14px;
    }
    .total-row {
      display: flex;
      justify-content: space-between;
      padding: 14px;
      font-size: 18px;
      font-weight: bold;
      background: #2A7FFF;
      color: #fff;
      border-radius: 0 0 8px 8px;
    }
    .error {
      background: #3a1a1a;
      color: #ff6b6b;
      padding: 10px 14px;
      border-radius: 8px;
      margin-top: 20px;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Cabinet Estimator</h1>

    <!-- Cabinet Type -->
    <div class="form-group">
      <label for="type">Cabinet Type</label>
      <select id="type">
        <option value="base">Base Cabinet</option>
        <option value="wall">Wall Cabinet</option>
      </select>
    </div>

    <!-- Width -->
    <div class="form-group">
      <label for="width">Width (mm)</label>
      <input type="number" id="width" value="900">
    </div>

    <!-- Height -->
    <div class="form-group">
      <label for="height">Height (mm)</label>
      <input type="number" id="height" value="720">
    </div>

    <!-- Depth -->
    <div class="form-group">
      <label for="depth">Depth (mm)</label>
      <input type="number" id="depth" value="560">
    </div>

    <!-- Estimate Button -->
    <button id="estimateBtn">Calculate Estimate</button>

    <!-- Output -->
    <div id="output" class="result"></div>
  </div>

  <!-- App Script — path matches your actual src/app.js location -->
  <script type="module" src="./src/app.js"></script>

</body>
</html>
